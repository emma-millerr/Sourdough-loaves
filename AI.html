<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cute Tic Tac Toe</title>

<!-- Cute Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Quicksand', sans-serif;
        background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    h1 {
        margin-top: 20px;
        color: #ff6fa5;
    }

    #status {
        font-size: 1.2rem;
        margin: 10px;
        color: #555;
        background: white;
        padding: 8px 15px;
        border-radius: 20px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 12px;
        margin: 20px 0;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        border-radius: 20px;
        font-size: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        transition: transform 0.15s ease, background 0.2s;
    }

    .cell:hover {
        transform: scale(1.08);
        background: #fff0f5;
    }

    .cell.X {
        color: #ff6fa5;
    }

    .cell.O {
        color: #6fc3ff;
    }

    button {
        padding: 10px 18px;
        font-size: 1rem;
        border: none;
        border-radius: 20px;
        background: #ff6fa5;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: 0.2s;
    }

    button:hover {
        background: #ff4f8b;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<h1>✨ Tic Tac Toe ✨</h1>
<div id="status">Your turn 💖</div>
<div id="board"></div>
<button onclick="resetGame()">Restart 🌸</button>

<script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("status");

    let cells = [];
    let gameActive = true;

    const winningCombos = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    function createBoard() {
        board.innerHTML = "";
        cells = [];

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.index = i;
            cell.addEventListener("click", handleMove);
            board.appendChild(cell);
            cells.push(cell);
        }
    }

    function handleMove(e) {
        const cell = e.target;

        if (!gameActive || cell.textContent !== "") return;

        cell.textContent = "X";
        cell.classList.add("X");

        if (checkWinner("X")) {
            statusText.textContent = "You win! 🎉";
            gameActive = false;
            return;
        }

        if (isDraw()) {
            statusText.textContent = "It's a draw! 💫";
            gameActive = false;
            return;
        }

        statusText.textContent = "Computer thinking... 🤖";
        setTimeout(computerMove, 500);
    }

    function computerMove() {
        let emptyCells = cells
            .map((cell, index) => cell.textContent === "" ? index : null)
            .filter(index => index !== null);

        let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        let cell = cells[randomIndex];

        cell.textContent = "O";
        cell.classList.add("O");

        if (checkWinner("O")) {
            statusText.textContent = "Computer wins! 😢";
            gameActive = false;
            return;
        }

        if (isDraw()) {
            statusText.textContent = "It's a draw! 💫";
            gameActive = false;
            return;
        }

        statusText.textContent = "Your turn 💖";
    }

    function checkWinner(player) {
        return winningCombos.some(combo => {
            return combo.every(index => cells[index].textContent === player);
        });
    }

    function isDraw() {
        return cells.every(cell => cell.textContent !== "");
    }

    function resetGame() {
        gameActive = true;
        statusText.textContent = "Your turn 💖";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
